<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EV Master Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EV Master">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3104/3104859.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-dark {
            background: #0f172a;
            border: 1px solid #334155;
            appearance: none;
        }
        .input-dark:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .car-pill {
            animation: fadeIn 0.3s ease-out;
            transition: all 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-2 gap-6 lg:h-[85vh]">
        <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
            <div class="flex items-center justify-between mb-6 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M15 9h4a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-4"/><path d="M15 5h4a2 2 0 0 1 2 2v2"/><path d="M13 13h1"/><path d="M9 13h1"/><path d="M11 22v-2"/></svg>
                    </div>
                    <h1 class="text-xl font-black uppercase tracking-tighter">EV Master Pro</h1>
                </div>
                <div id="authStatus" class="text-[9px] uppercase font-bold text-slate-500 bg-slate-800 px-2 py-1 rounded-full">Status: Offline</div>
            </div>

            <div class="space-y-5 overflow-y-auto pr-2 custom-scrollbar flex-1">
                <div class="p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 tracking-widest">Samochód</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="carName" placeholder="np. Tesla Model 3" class="flex-1 input-dark rounded-xl px-4 py-2 text-sm font-semibold">
                        <button onclick="saveCurrentConfig()" id="btnSave" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-xl text-[10px] uppercase tracking-widest transition-all">Zapisz</button>
                    </div>
                    <div id="savedCarsList" class="flex flex-wrap gap-2">
                        <div class="text-[10px] text-slate-600 italic">Czekam na konfigurację Firebase...</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-widest">Pojemność baterii (kWh)</label>
                        <input type="number" id="batCapacity" value="77" class="w-full input-dark rounded-xl px-4 py-3 font-bold text-lg">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-widest">Obecnie (%)</label>
                            <input type="number" id="startPct" value="20" class="w-full input-dark rounded-xl px-4 py-3 font-bold text-blue-400">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-widest">Cel (%)</label>
                            <input type="number" id="targetPct" value="80" class="w-full input-dark rounded-xl px-4 py-3 font-bold text-green-400">
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-800">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest text-center">Szybkie ustawienia</label>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="setSource(230, 10, 1)" class="bg-slate-800 hover:bg-blue-600/20 p-2 rounded-xl text-[10px] transition-all border border-slate-700 font-bold uppercase tracking-tight">Gniazdko (2.3kW)</button>
                        <button onclick="setSource(230, 16, 1)" class="bg-slate-800 hover:bg-blue-600/20 p-2 rounded-xl text-[10px] transition-all border border-slate-700 font-bold uppercase tracking-tight">Wzmocnione (3.7kW)</button>
                        <button onclick="setSource(400, 16, 3)" class="bg-blue-900/20 hover:bg-blue-800/40 p-2 rounded-xl text-[10px] transition-all border border-blue-500/30 font-bold uppercase tracking-tight">Siła 11kW</button>
                        <button onclick="setSource(400, 32, 3)" class="bg-blue-900/20 hover:bg-blue-800/40 p-2 rounded-xl text-[10px] transition-all border border-blue-500/30 font-bold uppercase tracking-tight">Wallbox 22kW</button>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div class="text-center">
                            <span class="text-[9px] font-bold text-slate-600 uppercase block mb-1">Volt</span>
                            <input type="number" id="volts" value="230" class="w-full input-dark rounded-lg px-2 py-2 text-xs text-center font-bold">
                        </div>
                        <div class="text-center">
                            <span class="text-[9px] font-bold text-slate-600 uppercase block mb-1">Amper</span>
                            <input type="number" id="amps" value="16" class="w-full input-dark rounded-lg px-2 py-2 text-xs text-center font-bold">
                        </div>
                        <div class="text-center">
                            <span class="text-[9px] font-bold text-slate-600 uppercase block mb-1">Fazy</span>
                            <select id="phases" class="w-full input-dark rounded-lg px-2 py-2 text-xs text-center font-bold appearance-none cursor-pointer">
                                <option value="1">1 Ph</option>
                                <option value="3">3 Ph</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-widest">Średnie zużycie (kWh/100km)</label>
                    <input type="number" id="consumption" value="18.5" class="w-full input-dark rounded-xl px-4 py-3 font-bold">
                </div>
            </div>
        </div>

        <div class="flex flex-col h-full">
            <div class="glass-card p-8 rounded-[2.5rem] flex-1 flex flex-col justify-center items-center text-center relative overflow-hidden shadow-2xl">
                <div class="absolute top-0 left-0 h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6] transition-all duration-700" id="progressLine"></div>
                
                <span class="text-slate-500 uppercase tracking-[0.4em] text-[10px] font-black mb-6">Przewidywany czas</span>
                <div class="text-7xl md:text-8xl font-black text-white mb-2 tracking-tighter" id="resultTime">0h 0m</div>
                <div class="text-blue-400 font-bold text-sm mb-12 tracking-widest uppercase" id="resultPower">NET: 0.00 kW</div>
                
                <div class="w-full grid grid-cols-2 gap-8 pt-10 border-t border-slate-800/50">
                    <div class="text-center">
                        <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 tracking-widest">Dodany Zasięg</span>
                        <span class="text-4xl font-black text-green-400" id="resultRange">0 km</span>
                    </div>
                    <div class="text-center">
                        <span class="text-slate-500 text-[10px] block uppercase font-black mb-1 tracking-widest">Energia</span>
                        <span class="text-4xl font-black text-yellow-400" id="resultEnergy">0 kWh</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // TUTAJ WKLEJ SWOJE DANE Z KONSOLI FIREBASE:
        // TUTAJ WKLEJ SWOJE DANE Z KONSOLI FIREBASE:
        const firebaseConfig = {
                apiKey: "AIzaSyC8CAxGEfwEKb9kawOU91qBnpFnvtuduD4",
                authDomain: "ev-master-pro.firebaseapp.com",
                projectId: "ev-master-pro",
                storageBucket: "ev-master-pro.firebasestorage.app",
                messagingSenderId: "197671821377",
                appId: "1:197671821377:web:b41a067444814084d2a6c0"
};
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ev-master-stable-v1';

        let user = null;
        const inputs = ['batCapacity', 'startPct', 'targetPct', 'volts', 'amps', 'phases', 'consumption'];
        const efficiency = 0.88;

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('authStatus').innerText = "ZSYNCHRONIZOWANO";
                loadCars();
            }
        });

        signInAnonymously(auth).catch(e => console.error("Auth error:", e));

        window.setSource = (v, a, p) => {
            document.getElementById('volts').value = v;
            document.getElementById('amps').value = a;
            document.getElementById('phases').value = p;
            calculate();
        };

        const calculate = () => {
            const cap = parseFloat(document.getElementById('batCapacity').value) || 0;
            const start = parseFloat(document.getElementById('startPct').value) || 0;
            const target = parseFloat(document.getElementById('targetPct').value) || 0;
            const volts = parseFloat(document.getElementById('volts').value) || 0;
            const amps = parseFloat(document.getElementById('amps').value) || 0;
            const phases = parseFloat(document.getElementById('phases').value) || 1;
            const cons = parseFloat(document.getElementById('consumption').value) || 1;

            const powerKw = (volts * amps * phases * efficiency) / 1000;
            const neededKwh = (Math.max(0, target - start) / 100) * cap;
            let hours = powerKw > 0 ? neededKwh / powerKw : 0;

            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            const addedRange = (neededKwh / cons) * 100;

            document.getElementById('resultTime').innerText = `${h}h ${m}m`;
            document.getElementById('resultPower').innerText = `NET: ${powerKw.toFixed(2)} kW`;
            document.getElementById('resultRange').innerText = `${Math.round(addedRange)} km`;
            document.getElementById('resultEnergy').innerText = `${neededKwh.toFixed(1)} kWh`;
            document.getElementById('progressLine').style.width = `${target}%`;
        };

        window.saveCurrentConfig = async () => {
            if (!user) return;
            const name = document.getElementById('carName').value.trim();
            if (!name) return;

            const config = {
                name,
                batCapacity: document.getElementById('batCapacity').value,
                consumption: document.getElementById('consumption').value,
                volts: document.getElementById('volts').value,
                amps: document.getElementById('amps').value,
                phases: document.getElementById('phases').value
            };

            await setDoc(doc(db, 'users', user.uid, 'cars', name), config);
            document.getElementById('carName').value = "";
        };

        window.deleteCar = async (name, e) => {
            e.stopPropagation();
            if (!user) return;
            await deleteDoc(doc(db, 'users', user.uid, 'cars', name));
        };

        function loadCars() {
            const carsCol = collection(db, 'users', user.uid, 'cars');
            onSnapshot(carsCol, (snapshot) => {
                const list = document.getElementById('savedCarsList');
                list.innerHTML = "";
                if (snapshot.empty) { list.innerHTML = '<div class="text-[9px] text-slate-600">Brak zapisanych aut</div>'; }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const container = document.createElement('div');
                    container.className = "car-pill flex items-center bg-slate-800/80 rounded-full pl-3 pr-1 py-1 border border-slate-700 cursor-pointer";
                    container.innerHTML = `<span class="text-[10px] font-bold uppercase mr-2 tracking-tight">${data.name}</span>`;
                    
                    const delBtn = document.createElement('button');
                    delBtn.className = "w-4 h-4 rounded-full bg-slate-700 hover:bg-red-500 text-[8px] flex items-center justify-center";
                    delBtn.innerHTML = "✕";
                    delBtn.onclick = (e) => deleteCar(data.name, e);

                    container.onclick = () => {
                        document.getElementById('batCapacity').value = data.batCapacity;
                        document.getElementById('consumption').value = data.consumption;
                        document.getElementById('volts').value = data.volts;
                        document.getElementById('amps').value = data.amps;
                        document.getElementById('phases').value = data.phases;
                        calculate();
                    };

                    container.appendChild(delBtn);
                    list.appendChild(container);
                });
            });
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
